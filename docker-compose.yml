version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: excel-query-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - upload_data:/app/uploads
      - output_data:/app/results
      - log_data:/app/logs
      - ssh_key_data:/app/config/ssh_keys
    environment:
      - FLASK_ENV=production
      - CONFIG_FILE=/app/config.yaml
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: excel-query-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - API_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  upload_data:
    driver: local
  output_data:
    driver: local
  log_data:
    driver: local
  ssh_key_data:
    driver: local

networks:
  app-network:
    driver: bridge
